services:
  agent_app:
    build: .
    container_name: neural_network_agent
    environment:
      # host.docker.internal dice a Docker di uscire dal container
      # e puntare al tuo Mac (dove l'app di Ollama sta attualmente usando i core M4 nativamente)
      - OLLAMA_HOST=http://host.docker.internal:11434
    env_file:
      - .env
    volumes:
      # Sincronizza i file in tempo reale senza dover ricostruire il docker
      - ./assets:/app/assets
      - ./inbox:/app/inbox
      - ./notes:/app/notes
      - ./raw_notes:/app/raw_notes
      - chroma_data:/app/.chroma_db
      - ./src:/app/src
      - ./main.py:/app/main.py
    # Apri la porta per FastAPI
    ports:
      - "8000:8000"
    # Avvia il server web FastAPI
    command: uvicorn src.database.api.api:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: neural_network_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  chroma_data:

